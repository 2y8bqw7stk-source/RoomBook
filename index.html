<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RoomBook - ESISA</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#f0f2f5;padding:20px}
        .container{max-width:1200px;margin:0 auto;background:white;border-radius:10px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
        h1{text-align:center;color:#333;margin-bottom:30px}
        .controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        select, input{padding:10px;border:1px solid #ddd;border-radius:5px}
        .btn{background:#007bff;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer}
        .btn:hover{background:#0056b3}
        .planning{border-collapse:collapse;width:100%;margin-top:20px}
        th,td{padding:10px;border:1px solid #ddd;text-align:center}
        th{background:#f8f9fa;font-weight:bold}
        .reservation{background:#007bff;color:white;padding:5px;border-radius:3px;font-size:12px;cursor:pointer;margin:2px}
        .reservation.en_attente{background:#ffc107;color:#333}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
        .modal-content{background:white;margin:10% auto;padding:20px;border-radius:10px;width:90%;max-width:500px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;font-weight:bold}
        .form-row{display:flex;gap:10px}
        .form-row input{flex:1}
        #loading{text-align:center;padding:50px;color:#666}
        @media(max-width:768px){.form-row{flex-direction:column}}
    </style>
</head>
<body>
    <div class="container">
        <h1>🗓️ RoomBook - Gestion Salles ESISA</h1>
        
        <div class="controls">
            <input type="date" id="dateSelect" value="2024-12-09">
            <select id="salleFilter"><option>Toutes salles</option></select>
            <button class="btn" onclick="loadData()">🔄 Actualiser</button>
            <button class="btn" onclick="openModal()">➕ Réserver</button>
        </div>
        
        <div id="loading">🔄 Connexion base de données...</div>
        <div id="planning"></div>
    </div>

    <!-- Modal Réservation -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Nouvelle Réservation</h2>
            <form id="formReservation">
                <div class="form-group">
                    <label>Salle</label>
                    <select id="salle_id" required></select>
                </div>
                <div class="form-group">
                    <label>Employé</label>
                    <select id="employe_id" required></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date_reservation" required>
                    </div>
                    <div class="form-group">
                        <label>Début</label>
                        <input type="time" id="heure_debut" required>
                    </div>
                    <div class="form-group">
                        <label>Fin</label>
                        <input type="time" id="heure_fin" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="titre" required>
                </div>
                <div style="text-align:right">
                    <button type="button" class="btn" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn">Réserver</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let salles = [], employes = [], reservations = [];

        // ================================
        // 🔗 LIAISON HTML ↔ SQL
        // ================================
        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            
            try {
                // 1. CHARGER SALLES
                salles = await fetch('api.php/salles').then(r=>r.json());
                fillSelect('salle_id', salles, 'nom');
                fillSelect('salleFilter', salles, 'nom');
                
                // 2. CHARGER EMPLOYES
                employes = await fetch('api.php/employes').then(r=>r.json());
                fillSelect('employe_id', employes, 'nom');
                
                // 3. CHARGER RESERVATIONS
                const date = document.getElementById('dateSelect').value || '2024-12-09';
                reservations = await fetch(`api.php/reservations?date=${date}`).then(r=>r.json());
                
                renderPlanning();
                document.getElementById('loading').style.display = 'none';
                console.log('✅ SQL connecté:', salles.length, 'salles,', employes.length, 'employés');
                
            } catch(error) {
                document.getElementById('loading').innerHTML = '❌ Erreur: ' + error;
            }
        }

        function fillSelect(id, data, field) {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Sélectionner...</option>';
            data.forEach(item => {
                select.innerHTML += `<option value="${item.id}">${item[field]} (${item.capacite||''})</option>`;
            });
        }

        function renderPlanning() {
            let html = `
                <table class="planning">
                <tr><th>Heure</th><th>Lundi ${document.getElementById('dateSelect').value}</th><th>Mardi</th><th>Mercredi</th></tr>
            `;
            
            const hours = ['09:00','10:00','11:00','12:00','14:00','15:00','16:00'];
            hours.forEach(h => {
                html += `<tr><td>${h}</td>`;
                for(let i=0; i<3; i++) {
                    const res = reservations.filter(r => overlaps(r.heure_debut, r.heure_fin, h, addHour(h)));
                    html += `<td>`;
                    res.forEach(r => {
                        html += `<div class="reservation ${r.statut}" title="${r.titre}">${r.titre.substring(0,15)}...</div>`;
                    });
                    html += `</td>`;
                }
                html += `</tr>`;
            });
            html += '</table>';
            document.getElementById('planning').innerHTML = html;
        }

        function overlaps(start1, end1, start2, end2) {
            const t1 = timeToMin(start1), t2 = timeToMin(end1);
            const t3 = timeToMin(start2), t4 = timeToMin(end2);
            return t1 < t4 && t3 < t2;
        }

        function timeToMin(t) {
            const [h,m] = t.split(':').map(Number);
            return h*60 + m;
        }

        function addHour(t) {
            const [h,m] = t.split(':').map(Number);
            return `${String(h+1).padStart(2,'0')}:${m}:00`;
        }

        // Modal
        function openModal() {
            document.getElementById('date_reservation').value = document.getElementById('dateSelect').value;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Submit form
        document.getElementById('formReservation').onsubmit = async function(e) {
            e.preventDefault();
            const data = {
                salle_id: document.getElementById('salle_id').value,
                employe_id: document.getElementById('employe_id').value,
                date_reservation: document.getElementById('date_reservation').value,
                heure_debut: document.getElementById('heure_debut').value + ':00',
                heure_fin: document.getElementById('heure_fin').value + ':00',
                titre: document.getElementById('titre').value
            };
            
            try {
                const res = await fetch('api.php/reservations', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if(res.ok) {
                    closeModal();
                    loadData();
                    alert('✅ Réservation créée !');
                } else {
                    const err = await res.json();
                    alert('❌ ' + err.error);
                }
            } catch(e) {
                alert('❌ Erreur: ' + e);
            }
        };

        // Événements
        document.getElementById('dateSelect').onchange = loadData;
        document.getElementById('salleFilter').onchange = function() {
            // Filtre (bonus)
        };

        // 🔄 LANCEMENT AUTOMATIQUE
        loadData();
    </script>
</body>
</html>
